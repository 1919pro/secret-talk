<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SecretTalk</title><script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0f;color:#e8e8f0;font-family:sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}.wrap{width:100%;max-width:420px}h1{color:#00e5a0;font-size:20px;margin-bottom:4px}.sub{font-size:11px;color:#666680;margin-bottom:20px}.card{background:#111118;border:1px solid #2a2a3a;border-radius:16px;padding:22px;margin-bottom:12px}.btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px;display:block}.btn-g{background:#00e5a0;color:#0a0a0f}.btn-d{background:#1a1a24;color:#e8e8f0;border:1px solid #2a2a3a}input{width:100%;background:#1a1a24;border:1px solid #2a2a3a;border-radius:10px;padding:12px;color:#e8e8f0;font-size:16px;outline:none;margin-bottom:12px}.rid{background:#1a1a24;border:1px solid #00e5a0;border-radius:12px;padding:16px;margin-bottom:16px;cursor:pointer}.rid-val{font-size:18px;font-weight:700;color:#00e5a0;word-break:break-all}.rid-hint{font-size:11px;color:#666680;margin-top:6px}.wave{display:flex;justify-content:center;gap:6px;margin:16px 0}.wave span{width:7px;height:7px;background:#00e5a0;border-radius:50%;opacity:.4;animation:wv 1.2s ease-in-out infinite}.wave span:nth-child(2){animation-delay:.2s}.wave span:nth-child(3){animation-delay:.4s}@keyframes wv{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-8px);opacity:1}}#chat{display:none;flex-direction:column;height:calc(100vh - 32px);max-height:680px;background:#111118;border:1px solid #2a2a3a;border-radius:16px;overflow:hidden}.ct{padding:12px 14px;border-bottom:1px solid #2a2a3a;display:flex;align-items:center;gap:8px}.ct-t{flex:1;font-size:12px;font-weight:700;color:#00e5a0}.ib{width:34px;height:34px;background:#1a1a24;border:1px solid #2a2a3a;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}#msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}.msg{display:flex;flex-direction:column;max-width:80%}.msg.me{align-self:flex-end;align-items:flex-end}.bbl{padding:9px 13px;border-radius:14px;font-size:14px;line-height:1.5;word-break:break-word}.msg.me .bbl{background:#00e5a0;color:#0a0a0f}.msg.them .bbl{background:#1a1a24;border:1px solid #2a2a3a}.mf{font-size:9px;color:#666680;margin-top:3px}.sys{text-align:center;font-size:10px;color:#666680;padding:3px 12px;background:#1a1a24;border-radius:20px;align-self:center;border:1px solid #2a2a3a}.sys.ok{color:#00e5a0}.sys.warn{color:#ff4466}.cf{padding:9px 11px;border-top:1px solid #2a2a3a;display:flex;gap:7px;align-items:flex-end}textarea{flex:1;background:#1a1a24;border:1px solid #2a2a3a;border-radius:12px;padding:10px 13px;color:#e8e8f0;font-size:14px;resize:none;outline:none;max-height:100px;line-height:1.4;font-family:inherit}.send{width:42px;height:42px;background:#00e5a0;border:none;border-radius:12px;cursor:pointer;flex-shrink:0}.hidden{display:none!important}.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a24;border:1px solid #00e5a0;color:#00e5a0;font-size:12px;padding:10px 20px;border-radius:28px;transition:transform .25s;z-index:999;pointer-events:none}.toast.show{transform:translateX(-50%) translateY(0)}</style></head><body><div class="wrap"><h1>🔒 SecretTalk</h1><div class="sub">E2E暗号化 · P2P · ログなし</div><div id="setup" class="card"><p style="font-size:13px;color:#666680;margin-bottom:16px">サーバーに会話は残りません。ブラウザを閉じると全て消えます。</p><button class="btn btn-g" onclick="startHost()">＋ 新しいルームを作る</button><button class="btn btn-d" onclick="goJoin()">→ ルームに参加する</button></div><div id="joinPanel" class="card hidden"><span style="font-size:12px;color:#666680;cursor:pointer;display:block;margin-bottom:14px" onclick="goSetup()">← 戻る</span><input id="joinInp" placeholder="ルームIDを入力" maxlength="16" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')" onkeydown="if(event.key==='Enter')doJoin()"><button class="btn btn-g" onclick="doJoin()">接続する</button></div><div id="waitPanel" class="card hidden"><div class="rid" onclick="copyId()"><div class="rid-val" id="ridDisplay">—</div><div class="rid-hint">📋 タップしてコピー → 相手に送る</div></div><div class="wave"><span></span><span></span><span></span></div><p style="text-align:center;font-size:12px;color:#666680">相手の接続を待っています...</p><button class="btn btn-d" style="margin-top:14px" onclick="goSetup()">キャンセル</button></div><div id="chat"><div class="ct"><div class="ct-t">🔒 SecretTalk</div><div class="ib" onclick="clearAll()" style="border-color:#ff4466"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ff4466" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H8L6 6"/></svg></div><div class="ib" onclick="doDisconnect()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div></div><div id="msgs"></div><div class="cf"><textarea id="msgInp" placeholder="メッセージを入力…" rows="1" onkeydown="handleKey(event)" oninput="resize(this)"></textarea><button class="send" onclick="send()"><svg width="17" height="17" viewBox="0 0 24 24" fill="#0a0a0f"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg></button></div></div></div><div class="toast" id="toast"></div><script>let peer=null,conn=null,ck=null,myId='';async function gk(){ck=await crypto.subtle.generateKey({name:'AES-GCM',length:256},true,['encrypt','decrypt']);}async function ek(){const r=await crypto.subtle.exportKey('raw',ck);return btoa(String.fromCharCode(...new Uint8Array(r)));}async function ik(b){const r=Uint8Array.from(atob(b),c=>c.charCodeAt(0));ck=await crypto.subtle.importKey('raw',r,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}async function enc(t){const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},ck,new TextEncoder().encode(t));const b=new Uint8Array(12+ct.byteLength);b.set(iv);b.set(new Uint8Array(ct),12);return btoa(String.fromCharCode(...b));}async function dec(b){try{const a=Uint8Array.from(atob(b),c=>c.charCodeAt(0));const p=await crypto.subtle.decrypt({name:'AES-GCM',iv:a.slice(0,12)},ck,a.slice(12));return new TextDecoder().decode(p);}catch{return '[エラー]';}}function gid(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:12},()=>c[Math.floor(Math.random()*c.length)]).join('');}function show(id){['setup','joinPanel','waitPanel','chat'].forEach(x=>{const e=document.getElementById(x);if(e){e.classList.add('hidden');e.style.display='none';}});const e=document.getElementById(id);e.classList.remove('hidden');e.style.display=id==='chat'?'flex':'block';}function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}function sys(t,c=''){const e=document.createElement('div');e.className='sys '+c;e.textContent=t;document.getElementById('msgs').appendChild(e);sc();}function sc(){const m=document.getElementById('msgs');setTimeout(()=>m.scrollTop=m.scrollHeight,50);}function resize(e){e.style.height='auto';e.style.height=Math.min(e.scrollHeight,100)+'px';}function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}function copyId(){navigator.clipboard.writeText(myId).then(()=>toast('📋 コピーしました！')).catch(()=>{const e=document.createElement('textarea');e.value=myId;document.body.appendChild(e);e.select();document.execCommand('copy');document.body.removeChild(e);toast('📋 コピーしました！');});}function goSetup(){cl();show('setup');}function goJoin(){show('joinPanel');}function ip(id){return new Promise((res,rej)=>{const cfg={debug:0,config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}};const p=id?new Peer(id,cfg):new Peer(cfg);p.on('open',()=>res(p));p.on('error',e=>{toast('⚠ '+e.type);rej(e);});});}async function startHost(){const rid=gid();try{peer=await ip(rid);myId=rid;await gk();document.getElementById('ridDisplay').textContent=myId;show('waitPanel');peer.on('connection',c=>{conn=c;sc2(true);});}catch(e){goSetup();}}async function doJoin(){const id=document.getElementById('joinInp').value.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');if(id.length<8){toast('⚠ IDを入力してください');return;}try{peer=await ip(undefined);conn=peer.connect(id,{reliable:true,serialization:'json'});myId=id;show('waitPanel');sc2(false);}catch(e){toast('⚠ エラー');goSetup();}}function sc2(h){conn.on('open',async()=>{if(h){const k=await ek();conn.send({type:'key',key:k});}oc();});conn.on('data',async d=>{if(d.type==='key'){await ik(d.key);return;}if(d.type==='del'){cl2();return;}if(d.type==='msg'){const t=await dec(d.p);am(t,'them');}});conn.on('close',()=>sys('相手が退出しました','warn'));conn.on('error',()=>sys('接続エラー','warn'));}function oc(){show('chat');sys('🔒 接続完了 · 暗号化通信中','ok');sys('メッセージはこのデバイスのみに存在します');}async function send(){const i=document.getElementById('msgInp');const t=i.value.trim();if(!t)return;if(!conn||!conn.open){toast('⚠ 未接続');return;}const p=await enc(t);conn.send({type:'msg',p});am(t,'me');i.value='';i.style.height='auto';}function am(t,s){const now=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});const id='M'+Date.now();const e=document.createElement('div');e.className='msg '+s;e.id=id;e.innerHTML='<div class="bbl">'+esc(t)+'</div><div class="mf">'+now+'</div>';document.getElementById('msgs').appendChild(e);sc();}function cl2(){document.getElementById('msgs').innerHTML='';sys('🗑 削除済み');}function clearAll(){if(!confirm('全削除？'))return;cl2();if(conn&&conn.open)conn.send({type:'del'});}function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}function cl(){if(conn){try{conn.close();}catch{}conn=null;}if(peer){try{peer.destroy();}catch{}peer=null;}ck=null;}function doDisconnect(){if(!confirm('切断しますか？'))return;cl();document.getElementById('msgs').innerHTML='';goSetup();}show('setup');</script></body></html>
