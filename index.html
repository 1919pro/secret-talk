<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"><title>SecretTalk</title><script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0f;color:#e8e8f0;font-family:'Helvetica Neue',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}.wrap{width:100%;max-width:420px}h1{color:#00e5a0;font-size:20px;margin-bottom:4px}.sub{font-size:11px;color:#666680;margin-bottom:24px}.card{background:#111118;border:1px solid #2a2a3a;border-radius:16px;padding:24px}.info{font-size:13px;color:#666680;line-height:1.6;margin-bottom:20px}.btn{width:100%;padding:15px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px}.btn-g{background:#00e5a0;color:#0a0a0f}.btn-d{background:#1a1a24;color:#e8e8f0;border:1px solid #2a2a3a}.lbl{font-size:11px;color:#666680;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:block}input{width:100%;background:#1a1a24;border:1px solid #2a2a3a;border-radius:10px;padding:13px 15px;color:#e8e8f0;font-size:16px;outline:none;margin-bottom:14px}input:focus{border-color:#00e5a0}.rid{background:#1a1a24;border:1px solid #00e5a0;border-radius:12px;padding:18px;margin-bottom:18px;cursor:pointer}.rid-val{font-size:20px;font-weight:700;color:#00e5a0;letter-spacing:.1em;word-break:break-all}.rid-hint{font-size:11px;color:#666680;margin-top:8px}.wave{display:flex;justify-content:center;gap:7px;margin:18px 0}.wave span{width:7px;height:7px;background:#00e5a0;border-radius:50%;opacity:.4;animation:wv 1.2s ease-in-out infinite}.wave span:nth-child(2){animation-delay:.2s}.wave span:nth-child(3){animation-delay:.4s}@keyframes wv{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-9px);opacity:1}}#chat{display:none;flex-direction:column;height:calc(100vh - 32px);max-height:700px;background:#111118;border:1px solid #2a2a3a;border-radius:16px;overflow:hidden}.chat-top{padding:13px 16px;border-bottom:1px solid #2a2a3a;display:flex;align-items:center;gap:10px}.chat-title{flex:1;font-size:13px;font-weight:700;color:#00e5a0}.ibtn{width:36px;height:36px;background:#1a1a24;border:1px solid #2a2a3a;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}#msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:9px}.msg{display:flex;flex-direction:column;max-width:80%}.msg.me{align-self:flex-end;align-items:flex-end}.bubble{padding:10px 14px;border-radius:16px;font-size:15px;line-height:1.5;word-break:break-word}.msg.me .bubble{background:#00e5a0;color:#0a0a0f;border-bottom-right-radius:4px}.msg.them .bubble{background:#1a1a24;border:1px solid #2a2a3a;border-bottom-left-radius:4px}.mfoot{font-size:9px;color:#666680;margin-top:4px}.sys{text-align:center;font-size:10px;color:#666680;padding:4px 14px;background:#1a1a24;border-radius:20px;align-self:center;border:1px solid #2a2a3a}.sys.ok{color:#00e5a0}.sys.warn{color:#ff4466}.chat-foot{padding:10px 12px;border-top:1px solid #2a2a3a;display:flex;gap:8px;align-items:flex-end}textarea{flex:1;background:#1a1a24;border:1px solid #2a2a3a;border-radius:14px;padding:12px 15px;color:#e8e8f0;font-size:15px;resize:none;outline:none;max-height:110px;line-height:1.45;font-family:inherit}textarea:focus{border-color:#00e5a0}.send{width:46px;height:46px;background:#00e5a0;border:none;border-radius:14px;cursor:pointer;flex-shrink:0}.hidden{display:none!important}.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(90px);background:#1a1a24;border:1px solid #00e5a0;color:#00e5a0;font-size:12px;padding:11px 22px;border-radius:30px;transition:transform .28s;z-index:999;white-space:nowrap;pointer-events:none}.toast.show{transform:translateX(-50%) translateY(0)}</style></head><body><div class="wrap"><h1>🔒 SecretTalk</h1><div class="sub">E2E暗号化 · P2P · ログなし</div><div id="setup" class="card"><p class="info">サーバーに会話は残りません。ブラウザを閉じると全て消えます。</p><button class="btn btn-g" onclick="startHost()">＋ 新しいルームを作る</button><button class="btn btn-d" onclick="goJoin()">→ ルームに参加する</button></div><div id="joinPanel" class="card hidden"><span style="font-size:12px;color:#666680;cursor:pointer;display:block;margin-bottom:16px" onclick="goSetup()">← 戻る</span><label class="lbl">ルームID</label><input id="joinInp" placeholder="例: ABCD1234EFGH" maxlength="16" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')" onkeydown="if(event.key==='Enter')doJoin()"><button class="btn btn-g" onclick="doJoin()">接続する</button></div><div id="waitPanel" class="card hidden"><div class="rid" onclick="copyId()"><div class="rid-val" id="ridDisplay">—</div><div class="rid-hint">📋 タップしてコピー → 相手に送る</div></div><div class="wave"><span></span><span></span><span></span></div><p style="text-align:center;font-size:12px;color:#666680">相手の接続を待っています...</p><div style="height:16px"></div><button class="btn btn-d" onclick="goSetup()">キャンセル</button></div><div id="chat"><div class="chat-top"><div style="flex:1"><div class="chat-title">🔒 SecretTalk</div><div style="font-size:10px;color:#666680;margin-top:2px" id="chatSub">E2EE · P2P</div></div><div class="ibtn" onclick="clearAll()" style="border-color:#ff4466"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#ff4466" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></div><div class="ibtn" onclick="doDisconnect()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div></div><div id="msgs"></div><div class="chat-foot"><textarea id="msgInp" placeholder="メッセージを入力…" rows="1" onkeydown="handleKey(event)" oninput="resize(this)"></textarea><button class="send" onclick="send()"><svg width="19" height="19" viewBox="0 0 24 24" fill="#0a0a0f"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg></button></div></div></div><div class="toast" id="toast"></div><script>let peer=null,conn=null,cryptoKey=null,myId='';async function genKey(){cryptoKey=await crypto.subtle.generateKey({name:'AES-GCM',length:256},true,['encrypt','decrypt']);}async function exportKey(){const r=await crypto.subtle.exportKey('raw',cryptoKey);return btoa(String.fromCharCode(...new Uint8Array(r)));}async function importKey(b64){const r=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));cryptoKey=await crypto.subtle.importKey('raw',r,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}async function enc(t){const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},cryptoKey,new TextEncoder().encode(t));const b=new Uint8Array(12+ct.byteLength);b.set(iv);b.set(new Uint8Array(ct),12);return btoa(String.fromCharCode(...b));}async function dec(b64){try{const b=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));const p=await crypto.subtle.decrypt({name:'AES-GCM',iv:b.slice(0,12)},cryptoKey,b.slice(12));return new TextDecoder().decode(p);}catch{return '[解読エラー]';}}function genId(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:12},()=>c[Math.floor(Math.random()*c.length)]).join('');}function show(id){['setup','joinPanel','waitPanel','chat'].forEach(x=>{const el=document.getElementById(x);if(el){el.classList.add('hidden');el.style.display='none';}});const el=document.getElementById(id);el.classList.remove('hidden');el.style.display=id==='chat'?'flex':'block';}function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}function sysMsg(t,c=''){const el=document.createElement('div');el.className='sys '+c;el.textContent=t;document.getElementById('msgs').appendChild(el);scrollEnd();}function scrollEnd(){const m=document.getElementById('msgs');setTimeout(()=>m.scrollTop=m.scrollHeight,50);}function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}function copyId(){navigator.clipboard.writeText(myId).then(()=>toast('📋 コピーしました！')).catch(()=>{const el=document.createElement('textarea');el.value=myId;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);toast('📋 コピーしました！');});}function goSetup(){cleanup();show('setup');}function goJoin(){show('joinPanel');}function initPeer(id){return new Promise((resolve,reject)=>{const cfg={debug:2,config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'},{urls:'stun:stun2.l.google.com:19302'}]}};const p=id?new Peer(id,cfg):new Peer(cfg);p.on('open',()=>resolve(p));p.on('error',(e)=>{toast('⚠ '+e.type);reject(e);});});}async function startHost(){const roomId=genId();try{peer=await initPeer(roomId);myId=roomId;await genKey();document.getElementById('ridDisplay').textContent=myId;show('waitPanel');peer.on('connection',c=>{conn=c;setupConn(true);});}catch(e){goSetup();}}async function doJoin(){const id=document.getElementById('joinInp').value.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');if(id.length<8){toast('⚠ ルームIDを入力してください');return;}try{peer=await initPeer(undefined);conn=peer.connect(id,{reliable:true,serialization:'json'});myId=id;show('waitPanel');setupConn(false);}catch(e){toast('⚠ 接続エラー');goSetup();}}function setupConn(asHost){conn.on('open',async()=>{if(asHost){const k=await exportKey();conn.send({type:'key',key:k});}openChat();});conn.on('data',async d=>{if(d.type==='key'){await importKey(d.key);return;}if(d.type==='delete_all'){clearLocal();return;}if(d.type==='msg'){const t=await dec(d.payload);addMsg(t,'them');}});conn.on('close',()=>sysMsg('相手が退出しました','warn'));conn.on('
error',()=>sysMsg('接続エラー','warn'));}function openChat(){show('chat');sysMsg('🔒 接続完了 · 暗号化通信中','ok');sysMsg('メッセージはこのデバイスのみに存在します');document.getElementById('chatSub').textContent='E2EE · P2P · '+myId;}async function send(){const inp=document.getElementById('msgInp');const text=inp.value.trim();if(!text)return;if(!conn||!conn.open){toast('⚠ 未接続');return;}const payload=await enc(text);conn.send({type:'msg',payload});addMsg(text,'me');inp.value='';inp.style.height='auto';}function addMsg(text,side){const now=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});const id='M'+Date.now()+Math.random().toString(36).slice(2,5);const el=document.createElement('div');el.className='msg '+side;el.id=id;el.innerHTML='<div class="bubble">'+esc(text)+'</div><div class="mfoot">'+now+'</div>';document.getElementById('msgs').appendChild(el);scrollEnd();}function clearLocal(){document.getElementById('msgs').innerHTML='';sysMsg('🗑 全メッセージ削除済み');}function clearAll(){if(!confirm('全削除しますか？'))return;clearLocal();if(conn&&conn.open)conn.send({type:'delete_all'});}function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}function cleanup(){if(conn){try{conn.close();}catch{}conn=null;}if(peer){try{peer.destroy();}catch{}peer=null;}cryptoKey=null;}function doDisconnect(){if(!confirm('切断しますか？'))return;cleanup();document.getElementById('msgs').innerHTML='';goSetup();}show('setup');</script></body></html
